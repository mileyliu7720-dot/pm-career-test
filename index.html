<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品经理职业体验测试</title>
<link rel="stylesheet" href="./tailwind.full.css">
<link rel="stylesheet" href="./style.css">
</head>
<body class="bg-white">

<!-- 首页 -->
<section id="home" class="min-h-screen bg-white flex flex-col items-center justify-center p-6 sm:p-8">
  <div class="w-full max-w-sm mx-auto text-center">
    <div class="mb-8">
      <svg class="w-12 h-12 mx-auto mb-6 text-gray-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight mb-3">产品经理职业体验测试</h1>
    <p class="text-gray-500 font-medium mb-8">基于真实工作情境设计</p>
    <div class="w-12 h-1 bg-gray-200 rounded-full mb-8 mx-auto"></div>
    <p class="text-sm text-gray-400 mb-10 bg-gray-50 py-3 px-6 rounded-xl border border-gray-100">本测试为已获取入口用户使用</p>
    <button onclick="startQuiz()" class="w-full bg-gray-900 hover:bg-black text-white font-medium py-4 px-8 rounded-2xl transition-all duration-200 active:scale-[0.98] shadow-md flex items-center justify-center gap-2">
      <span>开始测试</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </svg>
    </button>
  </div>
</section>

<!-- 测试页 -->
<section id="quiz" class="min-h-screen bg-white flex flex-col items-center p-4 sm:p-8 hidden">
  <div class="w-full max-w-md mx-auto flex flex-col flex-1 mt-4">
    <!-- 进度条 -->
    <div class="mb-10">
      <div class="flex justify-between items-center mb-3">
        <span class="text-sm font-medium text-gray-400">测试进度</span>
        <span id="progress-text" class="text-sm font-bold text-gray-900 bg-gray-100 px-3 py-1 rounded-full">1 / 30</span>
      </div>
      <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-gray-900 transition-all duration-300 ease-out" style="width: 0%"></div>
      </div>
    </div>
    <!-- 题目 -->
    <div id="question-area" class="flex-1 flex flex-col animate-fade-in-up">
      <h2 id="question-text" class="text-xl sm:text-2xl font-bold text-gray-900 mb-10 leading-snug"></h2>
      <div id="options-area" class="space-y-4 mt-auto sm:mt-0 mb-8 sm:mb-0"></div>
    </div>
  </div>
</section>

<!-- 结果页 -->
<section id="result" class="min-h-screen bg-gray-50 flex flex-col items-center py-8 px-4 sm:p-8 hidden">
  <div class="w-full max-w-md mx-auto flex flex-col items-center animate-fade-in-up">
    <div id="capture-area" class="w-full bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden mb-6 flex flex-col relative">
      <div id="result-header" class="bg-gray-900 pt-10 pb-16 px-6 text-center text-white relative">
        <div class="text-xs text-gray-400 font-medium tracking-widest uppercase mb-3">YOUR RESULT</div>
        <h1 id="result-type" class="text-3xl font-bold mb-4"></h1>
        <p id="result-summary" class="text-sm text-gray-300 opacity-90 leading-relaxed max-w-[280px] mx-auto"></p>
        <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-900">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>
      <div class="p-6 pt-10 pb-8 flex flex-col gap-6">
        <div id="result-desc" class="text-center space-y-2"></div>
        <div class="grid grid-cols-2 gap-4 mt-2">
          <div id="result-advantages" class="p-4 rounded-2xl border"></div>
          <div id="result-risks" class="p-4 rounded-2xl border bg-gray-50 text-gray-700 border-gray-100"></div>
        </div>
        <div id="result-suitable" class="bg-gray-50 rounded-2xl p-4 text-center border border-gray-100 mt-2"></div>
      </div>
    </div>
    <div class="w-full text-center mb-8 px-4">
      <p class="text-[15px] font-medium text-gray-900 bg-gray-100 py-3 px-6 rounded-2xl inline-block">"很多人做到一半才发现不适合，这只是第一步"</p>
    </div>
    <div class="w-full flex flex-col gap-4 mb-10">
      <div class="text-center text-sm text-gray-500 mb-1">可以截图你的结果，看看朋友是什么类型 📸</div>
      <button onclick="resetQuiz()" class="w-full bg-white border-2 border-gray-200 hover:border-gray-900 text-gray-900 font-bold py-4 px-8 rounded-2xl transition-all duration-200 active:scale-[0.98]">重新测试</button>
    </div>
    <p class="text-xs text-gray-400 text-center px-6">本测试为职业体验工具，仅供参考，不构成专业职业建议。</p>
  </div>
</section>

<script>
// 题目数据
const questions = [
  {id:1,text:"你认为产品经理最核心的工作是：",options:[{text:"推动项目上线",type:"A"},{text:"分析用户和数据",type:"B"},{text:"协调各方资源",type:"C"}]},
  {id:2,text:"面对不清晰需求，你会：",options:[{text:"先做一个版本",type:"A"},{text:"先分析清楚",type:"B"},{text:"边做边调整",type:"C"}]},
  {id:3,text:"产品失败，你更倾向认为是：",options:[{text:"执行问题",type:"A"},{text:"判断问题",type:"B"},{text:"协作问题",type:"C"}]},
  {id:4,text:"你更喜欢：",options:[{text:"快速推进事情",type:"A"},{text:"深入研究问题",type:"B"},{text:"让事情顺利进行",type:"C"}]},
  {id:5,text:"需求被反复修改，你会：",options:[{text:"继续推进",type:"A"},{text:"有点烦",type:"B"},{text:"尝试调整",type:"C"}]},
  {id:6,text:"你对频繁沟通的态度：",options:[{text:"可以接受",type:"A"},{text:"不太喜欢",type:"B"},{text:"还行",type:"C"}]},
  {id:7,text:"面对不确定性：",options:[{text:"先做",type:"A"},{text:"先想",type:"B"},{text:"小范围试",type:"C"}]},
  {id:8,text:"你更在意：",options:[{text:"进度",type:"A"},{text:"质量",type:"B"},{text:"平衡",type:"C"}]},
  {id:9,text:"方案被否定时：",options:[{text:"坚持推进",type:"A"},{text:"重新思考",type:"B"},{text:"沟通调整",type:"C"}]},
  {id:10,text:"你理解的PM是：",options:[{text:"推动者",type:"A"},{text:"思考者",type:"B"},{text:"协调者",type:"C"}]},
  {id:11,text:"只能选一个需求做：",options:[{text:"老板要的",type:"A"},{text:"数据支持的",type:"B"},{text:"用户呼声高的",type:"C"}]},
  {id:12,text:"有小bug但要上线：",options:[{text:"先上线",type:"A"},{text:"延期",type:"B"},{text:"部分上线",type:"C"}]},
  {id:13,text:"开发说做不了：",options:[{text:"强推",type:"A"},{text:"理解原因",type:"B"},{text:"一起找方案",type:"C"}]},
  {id:14,text:"需求中途被改：",options:[{text:"直接改",type:"A"},{text:"评估再改",type:"B"},{text:"分阶段处理",type:"C"}]},
  {id:15,text:"数据不好但你觉得对：",options:[{text:"继续推进",type:"A"},{text:"停下来分析",type:"B"},{text:"小范围验证",type:"C"}]},
  {id:16,text:"用户大量吐槽：",options:[{text:"马上改",type:"A"},{text:"分析原因",type:"B"},{text:"分类处理",type:"C"}]},
  {id:17,text:"设计和开发冲突：",options:[{text:"站一方",type:"A"},{text:"听完再判断",type:"B"},{text:"找折中",type:"C"}]},
  {id:18,text:"时间不够：",options:[{text:"只做核心",type:"A"},{text:"降低质量",type:"B"},{text:"调整方案",type:"C"}]},
  {id:19,text:"汇报工作：",options:[{text:"强调成果",type:"A"},{text:"用数据说话",type:"B"},{text:"讲逻辑过程",type:"C"}]},
  {id:20,text:"项目失败：",options:[{text:"换个方向继续",type:"A"},{text:"复盘找原因",type:"B"},{text:"调整策略再试",type:"C"}]},
  {id:21,text:"竞品出了新功能：",options:[{text:"我们也做",type:"A"},{text:"先分析价值",type:"B"},{text:"看用户反馈",type:"C"}]},
  {id:22,text:"老板给了不靠谱需求：",options:[{text:"先做再说",type:"A"},{text:"提出质疑",type:"B"},{text:"换个方式理解",type:"C"}]},
  {id:23,text:"团队士气低落：",options:[{text:"推动小胜利",type:"A"},{text:"找根本原因",type:"B"},{text:"一对一沟通",type:"C"}]},
  {id:24,text:"跨部门合作：",options:[{text:"直接推进",type:"A"},{text:"制定规范",type:"B"},{text:"建立关系",type:"C"}]},
  {id:25,text:"处理用户反馈：",options:[{text:"快速响应",type:"A"},{text:"分类归档",type:"B"},{text:"优先级排序",type:"C"}]},
  {id:26,text:"新功能上线后：",options:[{text:"看上线结果",type:"A"},{text:"看数据指标",type:"B"},{text:"收各方反馈",type:"C"}]},
  {id:27,text:"资源不足时：",options:[{text:"聚焦核心",type:"A"},{text:"砍低价值需求",type:"B"},{text:"争取更多资源",type:"C"}]},
  {id:28,text:"产品方向有分歧：",options:[{text:"先试一个",type:"A"},{text:"数据论证",type:"B"},{text:"综合各方意见",type:"C"}]},
  {id:29,text:"你觉得好的产品：",options:[{text:"快速迭代",type:"A"},{text:"逻辑严谨",type:"B"},{text:"体验流畅",type:"C"}]},
  {id:30,text:"如果重来一次：",options:[{text:"更快行动",type:"A"},{text:"更早看清",type:"B"},{text:"更好配合",type:"C"}]}
];

// 结果数据
const results = {
  A: {
    type: "推动型产品经理",
    description: `你在测试中更偏向"行动与推动"。\n你更关注结果落地，而不是反复讨论或分析。\n在面对不确定时，你倾向于先行动，而不是等待完美答案。`,
    summary: "你是那种会把事情往前推的人，而不是停在原地思考的人。",
    advantages: ["推进力强", "决策果断", "执行效率高"],
    risks: ["容易忽略细节", "可能和团队产生冲突", "有时决策过快"],
    suitable: ["初创团队", "快节奏项目"],
    colorTheme: "red"
  },
  B: {
    type: "分析型产品经理",
    description: `你在测试中更偏向"分析与判断"。\n你更重视数据、逻辑和正确性，在做决定前会倾向于思考清楚。\n相比快速推进，你更在意方向是否正确。`,
    summary: "你更像一个思考者，而不是一个推动者。",
    advantages: ["逻辑清晰", "数据敏感", "判断力强"],
    risks: ["行动力偏弱", "容易犹豫", "决策速度慢"],
    suitable: ["数据产品", "中后台产品"],
    colorTheme: "blue"
  },
  C: {
    type: "平衡型产品经理",
    description: `你在测试中表现出较强的"平衡能力"。\n你既不会盲目推进，也不会过度分析，\n更擅长在冲突中找到一个相对合理的解决方案。`,
    summary: "你不是最极端的，但你是最稳定的。",
    advantages: ["协调能力强", "综合判断能力好", "不容易走极端"],
    risks: ["决策不够果断", "有时容易妥协"],
    suitable: ["大多数产品团队", "需要协作的环境"],
    colorTheme: "emerald"
  }
};

let currentIndex = 0;
let answers = [];
let animating = false;

function showPage(id) {
  document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo(0, 0);
}

function startQuiz() {
  currentIndex = 0;
  answers = [];
  showPage('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIndex];
  const total = questions.length;
  const progress = currentIndex / total * 100;

  document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${progress}%`;

  const questionArea = document.getElementById('question-area');
  questionArea.classList.remove('animate-fade-in-up');
  void questionArea.offsetWidth;
  questionArea.classList.add('animate-fade-in-up');

  document.getElementById('question-text').textContent = `${q.id}. ${q.text}`;

  const optionsArea = document.getElementById('options-area');
  optionsArea.innerHTML = q.options.map((opt, i) => `
    <button onclick="selectOption('${opt.type}')" class="w-full text-left p-5 rounded-2xl border-2 border-gray-100 bg-white hover:border-gray-900 hover:bg-gray-50 transition-all duration-200 active:scale-[0.98] text-gray-700 font-medium group flex items-center justify-between shadow-sm">
      <span>${opt.text}</span>
      <div class="w-5 h-5 rounded-full border-2 border-gray-200 group-hover:border-gray-900 transition-colors flex items-center justify-center"></div>
    </button>
  `).join('');
}

function selectOption(type) {
  if (animating) return;
  animating = true;

  answers.push(type);

  const questionArea = document.getElementById('question-area');
  questionArea.style.opacity = '0';
  questionArea.style.transition = 'opacity 0.2s';

  setTimeout(() => {
    if (currentIndex < questions.length - 1) {
      currentIndex++;
      renderQuestion();
      questionArea.style.opacity = '1';
    } else {
      showResult();
    }
    animating = false;
  }, 300);
}

function showResult() {
  const count = { A: 0, B: 0, C: 0 };
  answers.forEach(a => count[a]++);

  let maxType = 'A';
  if (count.B > count[maxType]) maxType = 'B';
  if (count.C > count[maxType]) maxType = 'C';

  const r = results[maxType];

  document.getElementById('result-type').textContent = r.type;
  document.getElementById('result-summary').textContent = r.summary;

  const descEl = document.getElementById('result-desc');
  descEl.innerHTML = r.description.split('\n').map(line =>
    `<p class="text-[15px] text-gray-600 leading-relaxed">${line}</p>`
  ).join('');

  const advColorClass = {
    red: 'bg-red-50 text-red-700 border-red-100 marker:text-red-500',
    blue: 'bg-blue-50 text-blue-700 border-blue-100 marker:text-blue-500',
    emerald: 'bg-emerald-50 text-emerald-700 border-emerald-100 marker:text-emerald-500'
  }[r.colorTheme];

  document.getElementById('result-advantages').className = `p-4 rounded-2xl border ${advColorClass}`;
  document.getElementById('result-advantages').innerHTML = `
    <h3 class="text-xs font-bold uppercase tracking-wider mb-2 opacity-70">优势</h3>
    <ul class="list-disc list-inside text-sm font-medium space-y-1">
      ${r.advantages.map(a => `<li>${a}</li>`).join('')}
    </ul>
  `;

  document.getElementById('result-risks').innerHTML = `
    <h3 class="text-xs font-bold uppercase tracking-wider mb-2 opacity-50">风险</h3>
    <ul class="list-disc list-inside text-sm font-medium space-y-1 marker:text-gray-400">
      ${r.risks.map(r => `<li>${r}</li>`).join('')}
    </ul>
  `;

  document.getElementById('result-suitable').innerHTML = `
    <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">适合方向</h3>
    <div class="flex justify-center gap-2 flex-wrap">
      ${r.suitable.map(s => `<span class="bg-white px-3 py-1.5 rounded-full text-sm font-medium text-gray-700 shadow-sm border border-gray-100">${s}</span>`).join('')}
    </div>
  `;

  showPage('result');
}

function resetQuiz() {
  showPage('home');
}

showPage('home');
</script>
</body>
</html>
